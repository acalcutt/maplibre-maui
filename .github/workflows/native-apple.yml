name: Native Apple (Metal)

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS arm64
            cmake-system: iOS
            cmake-sysroot: iphoneos
            cmake-archs: arm64
            extra-flags: ""
            artifact: native-ios-arm64

          - name: iOS Simulator arm64
            cmake-system: iOS
            cmake-sysroot: iphonesimulator
            cmake-archs: arm64
            extra-flags: ""
            artifact: native-iossimulator-arm64

          - name: macCatalyst arm64+x64
            cmake-system: Darwin
            cmake-sysroot: macosx
            cmake-archs: "x86_64;arm64"
            extra-flags: -DCMAKE_XCODE_ATTRIBUTE_SUPPORTS_MACCATALYST=YES -DCMAKE_XCODE_ATTRIBUTE_IPHONEOS_DEPLOYMENT_TARGET=15.0 -DMLN_WITH_GLFW=OFF
            artifact: native-maccatalyst

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch darwin.cmake for macCatalyst
        if: ${{ matrix.artifact == 'native-maccatalyst' }}
        run: |
          # ios.cmake (only included when CMAKE_SYSTEM_NAME=iOS) links
          # mbgl-vendor-filesystem to mbgl-core, which provides the include
          # path for <ghc/filesystem.hpp> used by action_journal_impl.cpp.
          # Darwin builds omit ios.cmake, so add the link manually.
          echo 'target_link_libraries(mbgl-core PRIVATE mbgl-vendor-filesystem)' \
            >> dependencies/maplibre-native/platform/darwin/darwin.cmake

      - name: Configure CMake
        if: ${{ matrix.artifact != 'native-maccatalyst' }}
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_SYSTEM_NAME=${{ matrix.cmake-system }} \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.cmake-archs }}" \
            -DCMAKE_OSX_SYSROOT=${{ matrix.cmake-sysroot }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            ${{ matrix.extra-flags }} \
            -DMLN_WITH_METAL=ON

      - name: Configure and build macCatalyst (macabi)
        if: ${{ matrix.artifact == 'native-maccatalyst' }}
        run: |
          # Build for x86_64 and arm64 separately using the explicit macabi
          # target triple. This guarantees that every object file is tagged
          # as macCatalyst (macabi ABI) rather than plain macOS, avoiding the
          # "built for macOS" linker error when the MAUI app links the library.
          SYSROOT=$(xcrun --sdk macosx --show-sdk-path)
          IOSUPPORT_FWKS="$SYSROOT/System/iOSSupport/System/Library/Frameworks"
          IOSUPPORT_INC="$SYSROOT/System/iOSSupport/usr/include"
          CLANG=$(xcrun -f clang)
          CLANGXX=$(xcrun -f clang++)
          for ARCH in x86_64 arm64; do
            TRIPLE="${ARCH}-apple-ios15.0-macabi"
            # -iframework/-I add the iOSSupport headers; -Wno-overriding-t-option
            # suppresses the conflict when maplibre-native's macos.cmake injects
            # -mmacosx-version-min (the -target triple always takes precedence).
            EXTRA_FLAGS="-iframework $IOSUPPORT_FWKS -I$IOSUPPORT_INC -Wno-overriding-t-option"
            # CMAKE_<LANG>_COMPILER_TARGET is the canonical CMake way to set the
            # clang -target triple; it is inserted first in every compile command
            # and cannot be overridden by subdirectory flag manipulation, which
            # is what caused .mm files to compile as the native arm64 host arch.
            cmake -B "build-${ARCH}" \
              -G Ninja \
              -DCMAKE_SYSTEM_NAME=Darwin \
              -DCMAKE_OSX_SYSROOT=macosx \
              -DCMAKE_OSX_ARCHITECTURES="" \
              -DCMAKE_OSX_DEPLOYMENT_TARGET="" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER="$CLANG" \
              -DCMAKE_CXX_COMPILER="$CLANGXX" \
              -DCMAKE_OBJC_COMPILER="$CLANG" \
              -DCMAKE_OBJCXX_COMPILER="$CLANGXX" \
              "-DCMAKE_C_COMPILER_TARGET=${TRIPLE}" \
              "-DCMAKE_CXX_COMPILER_TARGET=${TRIPLE}" \
              "-DCMAKE_OBJC_COMPILER_TARGET=${TRIPLE}" \
              "-DCMAKE_OBJCXX_COMPILER_TARGET=${TRIPLE}" \
              "-DCMAKE_C_FLAGS=${EXTRA_FLAGS}" \
              "-DCMAKE_CXX_FLAGS=${EXTRA_FLAGS}" \
              "-DCMAKE_OBJC_FLAGS=${EXTRA_FLAGS}" \
              "-DCMAKE_OBJCXX_FLAGS=${EXTRA_FLAGS}" \
              -DMLN_WITH_GLFW=OFF \
              -DMLN_WITH_METAL=ON
            cmake --build "build-${ARCH}" --target mln-cabi --config Release --parallel
            CABI=$(find "build-${ARCH}" -name "libmln-cabi.a" | head -1)
            ALL_LIBS=$(find "build-${ARCH}" -name "*.a" -type f | sort)
            # shellcheck disable=SC2086
            libtool -static -o "${CABI}.merged" ${ALL_LIBS}
            mv "${CABI}.merged" "$CABI"
          done
          X86=$(find build-x86_64 -name "libmln-cabi.a" | head -1)
          ARM=$(find build-arm64 -name "libmln-cabi.a" | head -1)
          mkdir -p build
          lipo -create "$X86" "$ARM" -output build/libmln-cabi.a
          echo "Universal macCatalyst binary:"
          lipo -info build/libmln-cabi.a

      - name: Build mln-cabi
        if: ${{ matrix.artifact != 'native-maccatalyst' }}
        run: cmake --build build --target mln-cabi --config Release

      - name: Merge into self-contained archive
        if: ${{ matrix.artifact != 'native-maccatalyst' }}
        run: |
          # libmln-cabi.a is a thin C wrapper whose PRIVATE cmake link deps
          # (mbgl-core, metal-cpp symbols, vendor libs) are NOT merged into
          # it by the static archiver.  The Xcode generator puts every library
          # for the same configuration into identically-named subdirectories
          # (e.g. Release-iphoneos, Release-iphonesimulator, Release-maccatalyst).
          # Collect all of them and merge with libtool so the resulting archive
          # is self-contained and can be distributed as an XCFramework slice.
          CABI=$(find build -name "libmln-cabi.a" | head -1)
          echo "Target archive: $CABI"
          ALL_LIBS=$(find build -name "*.a" -type f | sort)
          echo "Libraries to merge:"
          echo "$ALL_LIBS"
          # shellcheck disable=SC2086
          libtool -static -o "${CABI}.merged" ${ALL_LIBS}
          mv "${CABI}.merged" "$CABI"
          echo "Merged object count: $(ar -t "$CABI" | wc -l)"

      - name: Locate built library
        id: find-lib
        run: |
          LIB=$(find build -name "libmln-cabi.a" | head -1)
          echo "path=$LIB" >> "$GITHUB_OUTPUT"
          echo "Found: $LIB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.find-lib.outputs.path }}
          retention-days: 7

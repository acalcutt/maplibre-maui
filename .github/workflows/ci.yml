name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Read version ──────────────────────────────────────────────────────────
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read VERSION
        id: read
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

  # ── Native builds (reuse per-platform workflows) ──────────────────────────
  build-windows:
    name: Build Windows native
    needs: version
    uses: ./.github/workflows/native-windows.yml

  build-android:
    name: Build Android native
    needs: version
    uses: ./.github/workflows/native-android.yml

  build-apple:
    name: Build Apple native
    needs: version
    uses: ./.github/workflows/native-apple.yml

  # ── NuGet pack (verify packability, no publish) ───────────────────────────
  pack:
    name: Pack NuGet
    runs-on: macos-15
    needs: [version, build-windows, build-android, build-apple]

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8 and 9 SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-artifacts

      - name: Arrange native libs for bindings project
        run: |
          N=bindings/native
          mkdir -p $N/win-x64 $N/win-arm64
          mkdir -p $N/android-arm64 $N/android-x64
          mkdir -p $N/ios-arm64 $N/maccatalyst

            find native-artifacts/native-windows-x64 -name "mbgl-cabi.dll" -exec cp {} $N/win-x64/ \;
            find native-artifacts/native-windows-arm64 -name "mbgl-cabi.dll" -exec cp {} $N/win-arm64/ \;
            find native-artifacts/native-android-arm64-v8a -name "libmbgl-cabi.so" -exec cp {} $N/android-arm64/ \;
            find native-artifacts/native-android-x86_64 -name "libmbgl-cabi.so" -exec cp {} $N/android-x64/ \;
            find native-artifacts/native-ios-arm64 -name "libmbgl-cabi.a" -exec cp {} $N/ios-arm64/ \;
            find native-artifacts/native-maccatalyst -name "libmbgl-cabi.a" -exec cp {} $N/maccatalyst/ \;

          echo "Native libs arranged:"
          find $N -type f
      - name: Restore workloads
        run: dotnet workload restore maplibre-maui.sln

      - name: Pack Maui.MapLibre.Native
        run: |
          dotnet pack bindings/Maui.MapLibre.Native.csproj \
            -c Release \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:_MbglNativeDir=$(pwd)/bindings/native/ \
            -o artifacts/

      - name: Pack Maui.Maplibre.Handlers
        run: |
          dotnet pack handlers/Maui.Maplibre.Handlers.csproj \
            -c Release \
            -p:Version=${{ needs.version.outputs.version }} \
            -o artifacts/

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-ci
          path: artifacts/*.nupkg
          retention-days: 3

  # ── Sample app builds (validate end-to-end compilation) ───────────────────
  sample-android:
    name: Sample — Android
    runs-on: ubuntu-latest
    needs: [version, build-android]

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Android native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-android-*
          path: native-artifacts

      - name: Arrange Android native libs
        run: |
          N=bindings/native
          mkdir -p $N/android-arm64 $N/android-x64
          find native-artifacts/native-android-arm64-v8a -name "libmbgl-cabi.so" -exec cp {} $N/android-arm64/ \;
          find native-artifacts/native-android-x86_64   -name "libmbgl-cabi.so" -exec cp {} $N/android-x64/ \;

      - name: Restore workloads
        run: dotnet workload restore sample/MauiSample.csproj

      - name: Publish sample (Android)
        run: |
          dotnet publish sample/MauiSample.csproj \
            -f net9.0-android \
            -c Release \
            -p:AndroidPackageFormats=apk \
            -p:AndroidKeyStore=false \
            -o sample/bin/publish-android

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: sample-android-apk
          path: sample/bin/publish-android/**/*.apk
          retention-days: 7

  sample-windows:
    name: Sample — Windows
    runs-on: windows-latest
    needs: [version, build-windows]

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download Windows native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-windows-*
          path: native-artifacts

      - name: Arrange Windows native libs
        shell: pwsh
        run: |
          $N = "bindings/native"
          New-Item -ItemType Directory -Force -Path "$N/win-x64","$N/win-arm64" | Out-Null
          Get-ChildItem -Recurse native-artifacts/native-windows-x64   -Filter mbgl-cabi.dll | Copy-Item -Destination "$N/win-x64/"
          Get-ChildItem -Recurse native-artifacts/native-windows-arm64  -Filter mbgl-cabi.dll | Copy-Item -Destination "$N/win-arm64/"

      - name: Restore workloads
        run: dotnet workload restore sample/MauiSample.csproj

      - name: Publish sample (Windows)
        run: |
          dotnet publish sample/MauiSample.csproj `
            -f net9.0-windows10.0.19041.0 `
            -c Release `
            -p:WindowsPackageType=None `
            -o sample/bin/publish-windows

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: sample-windows-x64
          path: sample/bin/publish-windows/
          retention-days: 7

  sample-apple:
    name: Sample — iOS & macCatalyst
    runs-on: macos-15
    needs: [version, build-apple]

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download Apple native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-ios-arm64
          path: native-artifacts

      - name: Arrange Apple native libs
        run: |
          N=bindings/native
          mkdir -p $N/ios-arm64 $N/maccatalyst
          find native-artifacts/native-ios-arm64 -name "libmbgl-cabi.a" -exec cp {} $N/ios-arm64/ \;
          # macCatalyst lib is the same universal binary
          cp $N/ios-arm64/libmbgl-cabi.a $N/maccatalyst/

      - name: Restore workloads
        run: dotnet workload restore sample/MauiSample.csproj

      - name: Build sample (iOS)
        run: |
          dotnet build sample/MauiSample.csproj \
            -f net9.0-ios \
            -c Release \
            --no-restore \
            -p:_MbglNativeDir=$(pwd)/bindings/native/ \
            -p:RuntimeIdentifier=ios-arm64

      - name: Build sample (macCatalyst)
        run: |
          dotnet build sample/MauiSample.csproj \
            -f net9.0-maccatalyst \
            -c Release \
            --no-restore \
            -p:_MbglNativeDir=$(pwd)/bindings/native/

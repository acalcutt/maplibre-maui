name: Native Android

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Android ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Clone maplibre-native at pinned commit
        run: |
          git clone https://github.com/maplibre/maplibre-native.git dependencies/maplibre-native
          git -C dependencies/maplibre-native checkout 647636bf6115e058991dd644638ba6748c9cf4c6
          git -C dependencies/maplibre-native submodule update --init --recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: sdkmanager "ndk;27.0.12077973"

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_HOME/ndk/27.0.12077973/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DMLN_WITH_OPENGL=ON

      - name: Build mbgl-cabi
        timeout-minutes: 60
        run: cmake --build build --target mbgl-cabi --parallel 4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-android-${{ matrix.abi }}
          path: build/libmbgl-cabi.so
          retention-days: 7

name: Native Windows Vulkan

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Windows x64 Vulkan
    runs-on: windows-latest

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC developer tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Get vcpkg commit ID
        id: vcpkg-id
        shell: pwsh
        run: |
          $id = git -C dependencies/maplibre-native/platform/windows/vendor/vcpkg rev-parse HEAD
          Add-Content -Path $env:GITHUB_OUTPUT -Value "commit_id=$id"

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: dependencies/maplibre-native/platform/windows/vendor/vcpkg/archives
          key: vcpkg-x64-windows-vulkan-${{ steps.vcpkg-id.outputs.commit_id }}

      - name: Bootstrap vcpkg
        run: dependencies\maplibre-native\platform\windows\vendor\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Configure CMake
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}\\dependencies\\maplibre-native\\platform\\windows\\vendor\\vcpkg\\archives,readwrite"
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "CMake configure attempt $attempt of $maxAttempts"
            cmake -B build `
              -G "Visual Studio 17 2022" -A x64 `
              -DCMAKE_TOOLCHAIN_FILE="dependencies/maplibre-native/platform/windows/custom-toolchain.cmake" `
              -DMLN_WITH_OPENGL=OFF `
              -DMLN_WITH_EGL=OFF `
              -DMLN_WITH_VULKAN=ON `
              "-DCMAKE_CXX_FLAGS=/wd4267"
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Attempt $attempt failed (exit $LASTEXITCODE), cleaning and retrying..."
              Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
            } else { exit $LASTEXITCODE }
          }

      - name: Build mbgl-cabi
        run: cmake --build build --target mbgl-cabi --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-mln-windows-x64-vulkan
          path: build/**/mbgl-cabi.dll
          retention-days: 7

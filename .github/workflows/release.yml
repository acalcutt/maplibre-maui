name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version:   ${{ steps.check.outputs.version }}
      published: ${{ steps.check.outputs.published }}

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION and check GitHub releases
        id: check
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "published=true"  >> "$GITHUB_OUTPUT"
            echo "Already released — skipping build."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Not yet released — proceeding."
          fi

  # ── Native builds (reuse per-platform CI workflows) ───────────────────────
  build-windows:
    name: Build Windows native
    needs: version-check
    if: needs.version-check.outputs.published == 'false'
    uses: ./.github/workflows/native-windows.yml

  build-android:
    name: Build Android native
    needs: version-check
    if: needs.version-check.outputs.published == 'false'
    uses: ./.github/workflows/native-android.yml

  build-apple:
    name: Build Apple native
    needs: version-check
    if: needs.version-check.outputs.published == 'false'
    uses: ./.github/workflows/native-apple.yml

  # ── NuGet packaging ───────────────────────────────────────────────────────
  pack:
    name: Pack NuGet
    runs-on: macos-latest
    needs: [version-check, build-windows, build-android, build-apple]
    if: needs.version-check.outputs.published == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Pin .NET SDK to Xcode-16-compatible feature band
        # macos-latest still ships with Xcode 16.4; the 9.0.200 feature band was
        # published before WWDC 2025 so its iOS/macCatalyst workloads target Xcode 16.
        run: echo '{"sdk":{"version":"9.0.200","rollForward":"latestPatch"}}' > global.json

      - name: Set up .NET 8 and 9 SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.200

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-artifacts

      - name: Arrange native libs for bindings project
        run: |
          N=bindings/native
          mkdir -p $N/win-x64 $N/win-arm64
          mkdir -p $N/android-arm64 $N/android-x64
          mkdir -p $N/ios-arm64 $N/maccatalyst

            find native-artifacts/native-windows-x64 -name "mbgl-cabi.dll" -exec cp {} $N/win-x64/ \;
            find native-artifacts/native-windows-arm64 -name "mbgl-cabi.dll" -exec cp {} $N/win-arm64/ \;
            find native-artifacts/native-android-arm64-v8a -name "libmbgl-cabi.so" -exec cp {} $N/android-arm64/ \;
            find native-artifacts/native-android-x86_64 -name "libmbgl-cabi.so" -exec cp {} $N/android-x64/ \;
            find native-artifacts/native-ios-arm64 -name "libmbgl-cabi.a" -exec cp {} $N/ios-arm64/ \;
            find native-artifacts/native-maccatalyst -name "libmbgl-cabi.a" -exec cp {} $N/maccatalyst/ \;

          echo "Native libs arranged:"
          find $N -type f
      - name: Restore workloads
        run: dotnet workload restore maplibre-maui.sln

      - name: Pack Maui.MapLibre.Native
        run: |
          dotnet pack bindings/Maui.MapLibre.Native.csproj \
            -c Release \
            -p:Version=${{ needs.version-check.outputs.version }} \
            -p:_MbglNativeDir=$(pwd)/bindings/native/ \
            -o artifacts/

      - name: Pack Maui.Maplibre.Handlers
        run: |
          dotnet pack handlers/Maui.Maplibre.Handlers.csproj \
            -c Release \
            -p:Version=${{ needs.version-check.outputs.version }} \
            -o artifacts/

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 7

  # ── WPF NuGet packaging (Windows runner — WPF SDK requires Windows) ───────
  pack-wpf:
    name: Pack WPF NuGet + Windows samples
    runs-on: windows-latest
    needs: [version-check, build-windows]
    if: needs.version-check.outputs.published == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download Windows native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-windows-*
          path: native-artifacts

      - name: Stage native DLLs
        shell: bash
        run: |
          mkdir -p bindings/native/win-x64 bindings/native/win-arm64
          find native-artifacts/native-windows-x64  -name "mbgl-cabi.dll" -exec cp {} bindings/native/win-x64/ \;
          find native-artifacts/native-windows-arm64 -name "mbgl-cabi.dll" -exec cp {} bindings/native/win-arm64/ \;
          echo "Staged DLLs:"
          find bindings/native -name "*.dll"

      - name: Pack Maui.MapLibre.WPF
        shell: bash
        run: |
          dotnet pack wpf/Maui.MapLibre.WPF.csproj \
            -c Release \
            -p:Version=${{ needs.version-check.outputs.version }} \
            -o artifacts/

      - name: Publish ConsoleExample (win-x64)
        shell: bash
        run: |
          dotnet publish sample/ConsoleExample/ConsoleExample.csproj \
            -c Release -r win-x64 --self-contained false \
            -o publish/ConsoleExample-win-x64

      - name: Publish ConsoleExample (win-arm64)
        shell: bash
        run: |
          dotnet publish sample/ConsoleExample/ConsoleExample.csproj \
            -c Release -r win-arm64 --self-contained false \
            -o publish/ConsoleExample-win-arm64

      - name: Publish WpfExample (win-x64)
        shell: bash
        run: |
          dotnet publish sample/WpfExample/WpfExample.csproj \
            -c Release -r win-x64 --self-contained false \
            -o publish/WpfExample-win-x64

      - name: Publish WpfExample (win-arm64)
        shell: bash
        run: |
          dotnet publish sample/WpfExample/WpfExample.csproj \
            -c Release -r win-arm64 --self-contained false \
            -o publish/WpfExample-win-arm64

      - name: Zip sample outputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path samples -Force | Out-Null
          @('ConsoleExample-win-x64','ConsoleExample-win-arm64','WpfExample-win-x64','WpfExample-win-arm64') | ForEach-Object {
            Compress-Archive -Path "publish/$_/*" -DestinationPath "samples/$_.zip"
          }

      - name: Upload WPF NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-wpf
          path: artifacts/*.nupkg
          retention-days: 7

      - name: Upload Windows samples
        uses: actions/upload-artifact@v4
        with:
          name: windows-samples
          path: samples/*.zip
          retention-days: 7

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [version-check, pack, pack-wpf]
    if: needs.version-check.outputs.published == 'false'
    environment: release

    steps:
      - uses: actions/checkout@v4

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          pattern: nuget-packages*
          merge-multiple: true
          path: artifacts/

      - name: Download Windows sample zips
        uses: actions/download-artifact@v4
        with:
          name: windows-samples
          path: artifacts/

      - name: Extract changelog for version
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## $VERSION" \
              'BEGIN{p=0} $0==ver{p=1;next} /^## /&&p{exit} p{print}' \
              CHANGELOG.md > release-notes.md
          else
            echo "Release v${VERSION}." > release-notes.md
          fi
          cat release-notes.md

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:          v${{ needs.version-check.outputs.version }}
          name:         v${{ needs.version-check.outputs.version }}
          bodyFile:     release-notes.md
          artifacts:    "artifacts/*.nupkg,artifacts/*.zip"
          draft:        false
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

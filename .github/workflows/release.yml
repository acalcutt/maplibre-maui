name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version:   ${{ steps.check.outputs.version }}
      published: ${{ steps.check.outputs.published }}

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION and check GitHub releases
        id: check
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "published=true"  >> "$GITHUB_OUTPUT"
            echo "Already released — skipping build."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Not yet released — proceeding."
          fi

  # ── Native builds (reuse per-platform CI workflows) ───────────────────────
  build-windows:
    name: Build Windows OpenGL native
    needs: version-check
    if: needs.version-check.outputs.published == 'false'
    uses: ./.github/workflows/native-windows.yml

  build-android:
    name: Build Android OpenGL native
    needs: version-check
    if: needs.version-check.outputs.published == 'false'
    uses: ./.github/workflows/native-android.yml

  build-apple:
    name: Build Apple Metal native
    needs: version-check
    if: needs.version-check.outputs.published == 'false'
    uses: ./.github/workflows/native-apple.yml

  build-windows-vulkan:
    name: Build Windows Vulkan native
    needs: version-check
    if: needs.version-check.outputs.published == 'false'
    uses: ./.github/workflows/native-windows-vulkan.yml

  build-android-vulkan:
    name: Build Android Vulkan native
    needs: version-check
    if: needs.version-check.outputs.published == 'false'
    uses: ./.github/workflows/native-android-vulkan.yml

  # ── NuGet packaging ───────────────────────────────────────────────────────
  pack:
    name: Pack NuGet
    runs-on: macos-latest
    needs: [version-check, build-windows, build-android, build-apple]
    if: needs.version-check.outputs.published == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8 and 9 SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-artifacts

      - name: Arrange native libs for bindings project
        run: |
          N=bindings/native
          mkdir -p $N/win-x64 $N/win-arm64
          mkdir -p $N/android-arm64 $N/android-x64
          mkdir -p $N/ios-arm64 $N/iossimulator-arm64 $N/maccatalyst

            find native-artifacts/native-windows-x64 -name "mln-cabi.dll" -exec cp {} $N/win-x64/ \;
            find native-artifacts/native-windows-arm64 -name "mln-cabi.dll" -exec cp {} $N/win-arm64/ \;
            find native-artifacts/native-android-arm64-v8a -name "libmln-cabi.so" -exec cp {} $N/android-arm64/ \;
            find native-artifacts/native-android-x86_64 -name "libmln-cabi.so" -exec cp {} $N/android-x64/ \;
            find native-artifacts/native-ios-arm64 -name "libmln-cabi.a" -exec cp {} $N/ios-arm64/ \;
            find native-artifacts/native-iossimulator-arm64 -name "libmln-cabi.a" -exec cp {} $N/iossimulator-arm64/ \;
            find native-artifacts/native-maccatalyst -name "libmln-cabi.a" -exec cp {} $N/maccatalyst/ \;

          echo "Native libs arranged:"
          find $N -type f
      - name: Create iOS XCFramework
        run: |
          N=bindings/native
          mkdir -p $N/ios
          XCFW_ARGS=""
          [ -f $N/ios-arm64/libmln-cabi.a ]         && XCFW_ARGS="$XCFW_ARGS -library $N/ios-arm64/libmln-cabi.a"
          [ -f $N/iossimulator-arm64/libmln-cabi.a ] && XCFW_ARGS="$XCFW_ARGS -library $N/iossimulator-arm64/libmln-cabi.a"
          if [ -n "$XCFW_ARGS" ]; then
            xcodebuild -create-xcframework \
              $XCFW_ARGS \
              -output $N/ios/libmln-cabi.xcframework
            echo "XCFramework created at $N/ios/libmln-cabi.xcframework"
          else
            echo "No iOS libraries found; skipping XCFramework creation."
          fi
      - name: Restore workloads
        run: dotnet workload restore maplibre-maui.sln

      - name: Pack MapLibreNative.Maui
        run: |
          dotnet pack bindings/MapLibreNative.Maui.csproj \
            -c Release \
            -p:Version=${{ needs.version-check.outputs.version }} \
            -p:_MbglNativeDir=$(pwd)/bindings/native/ \
            -o artifacts/

      - name: Pack MapLibreNative.Maui.Handlers
        run: |
          dotnet pack handlers/MapLibreNative.Maui.Handlers.csproj \
            -c Release \
            -p:Version=${{ needs.version-check.outputs.version }} \
            -o artifacts/

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 7

  # ── WPF NuGet packaging (Windows runner — WPF SDK requires Windows) ───────
  pack-wpf:
    name: Pack WPF NuGet + Windows samples
    runs-on: windows-latest
    needs: [version-check, build-windows, pack]
    if: needs.version-check.outputs.published == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8 and 9 SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Download Windows native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-windows-*
          path: native-artifacts

      - name: Stage native DLLs
        shell: bash
        run: |
          mkdir -p bindings/native/win-x64 bindings/native/win-arm64
          find native-artifacts/native-windows-x64  -name "mln-cabi.dll" -exec cp {} bindings/native/win-x64/ \;
          find native-artifacts/native-windows-arm64 -name "mln-cabi.dll" -exec cp {} bindings/native/win-arm64/ \;
          echo "Staged DLLs:"
          find bindings/native -name "*.dll"

      - name: Pack MapLibreNative.Maui.WPF
        shell: bash
        run: |
          dotnet pack wpf/MapLibreNative.Maui.WPF.csproj \
            -c Release \
            -p:Version=${{ needs.version-check.outputs.version }} \
            -o artifacts/

      - name: Download MAUI NuGet packages (for local feed)
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: local-feed

      - name: Add local NuGet feed
        run: dotnet nuget add source "${{ github.workspace }}\local-feed" --name local-release

      - name: Restore MAUI workloads
        run: dotnet workload restore sample/MauiSample.csproj

      - name: Publish ConsoleExample (win-x64)
        shell: bash
        run: |
          dotnet publish sample/ConsoleExample/ConsoleExample.csproj \
            -c Release -r win-x64 --self-contained false \
            -o publish/ConsoleExample-win-x64

      - name: Publish ConsoleExample (win-arm64)
        shell: bash
        run: |
          dotnet publish sample/ConsoleExample/ConsoleExample.csproj \
            -c Release -r win-arm64 --self-contained false \
            -o publish/ConsoleExample-win-arm64

      - name: Publish WpfExample (win-x64)
        shell: bash
        run: |
          dotnet publish sample/WpfExample/WpfExample.csproj \
            -c Release -r win-x64 --self-contained false \
            -o publish/WpfExample-win-x64

      - name: Publish WpfExample (win-arm64)
        shell: bash
        run: |
          dotnet publish sample/WpfExample/WpfExample.csproj \
            -c Release -r win-arm64 --self-contained false \
            -o publish/WpfExample-win-arm64

      - name: Publish MauiSample (win-x64)
        shell: bash
        run: |
          dotnet publish sample/MauiSample.csproj \
            -f net9.0-windows10.0.19041.0 \
            -c Release -r win-x64 \
            -p:TargetFrameworks=net9.0-windows10.0.19041.0 \
            -p:WindowsPackageType=None \
            -p:UseLocalPackages=true \
            -o publish/MauiSample-win-x64

      - name: Publish MauiSample (win-arm64)
        shell: bash
        run: |
          dotnet publish sample/MauiSample.csproj \
            -f net9.0-windows10.0.19041.0 \
            -c Release -r win-arm64 \
            -p:TargetFrameworks=net9.0-windows10.0.19041.0 \
            -p:WindowsPackageType=None \
            -p:UseLocalPackages=true \
            -o publish/MauiSample-win-arm64

      - name: Zip sample outputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path samples -Force | Out-Null
          @(
            'ConsoleExample-win-x64','ConsoleExample-win-arm64',
            'WpfExample-win-x64','WpfExample-win-arm64',
            'MauiSample-win-x64','MauiSample-win-arm64'
          ) | ForEach-Object {
            Compress-Archive -Path "publish/$_/*" -DestinationPath "samples/$_.zip"
          }

      - name: Upload WPF NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-wpf
          path: artifacts/*.nupkg
          retention-days: 7

      - name: Upload Windows samples
        uses: actions/upload-artifact@v4
        with:
          name: windows-samples
          path: samples/*.zip
          retention-days: 7

  # ── Android + iOS + macCatalyst sample builds ───────────────────────────
  samples-mobile:
    name: Build mobile + macCatalyst samples
    runs-on: macos-26
    needs: [version-check, pack]
    if: needs.version-check.outputs.published == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8 and 9 SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Download MAUI NuGet packages (for local feed)
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: local-feed

      - name: Add local NuGet feed
        run: dotnet nuget add source $(pwd)/local-feed --name local-release

      - name: Restore MAUI workloads
        run: dotnet workload restore sample/MauiSample.csproj

      - name: Build MauiSample (android)
        run: |
          dotnet build sample/MauiSample.csproj \
            -f net9.0-android \
            -c Release \
            -p:EnableWindowsTargeting=true \
            -p:UseLocalPackages=true

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-samples
          path: sample/bin/Release/net9.0-android/*Signed.apk
          retention-days: 7

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Build MauiSample (iOS simulator)
        run: |
          dotnet build sample/MauiSample.csproj \
            -f net9.0-ios \
            -r iossimulator-arm64 \
            -c Release \
            -p:EnableWindowsTargeting=true \
            -p:UseLocalPackages=true

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: sample-ios-simulator
          path: sample/bin/Release/net9.0-ios/iossimulator-arm64/**/*.app
          retention-days: 7

      - name: Build MauiSample (macCatalyst)
        run: |
          dotnet build sample/MauiSample.csproj \
            -f net9.0-maccatalyst \
            -c Release \
            -p:EnableCodeSigning=false \
            -p:EnableWindowsTargeting=true \
            -p:UseLocalPackages=true

      - name: Upload macCatalyst app
        uses: actions/upload-artifact@v4
        with:
          name: sample-maccatalyst
          path: sample/bin/Release/net9.0-maccatalyst/**/*.app
          retention-days: 7

  # ── Vulkan NuGet packaging ────────────────────────────────────────────────
  pack-vulkan:
    name: Pack Vulkan NuGet
    runs-on: macos-latest
    needs: [version-check, build-windows-vulkan, build-android-vulkan, build-apple]
    if: needs.version-check.outputs.published == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8 and 9 SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Download MLN native artifacts (Windows + Android)
        uses: actions/download-artifact@v4
        with:
          pattern: native-mln-*
          path: mln-artifacts

      - name: Download Apple native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-ios-arm64
          path: mln-artifacts

      - name: Download Apple iOS simulator native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-iossimulator-arm64
          path: mln-artifacts

      - name: Download Apple macCatalyst native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-maccatalyst
          path: mln-artifacts

      - name: Arrange native libs for Vulkan bindings project
        run: |
          N=bindings/native-vulkan
          mkdir -p $N/win-x64 $N/win-arm64
          mkdir -p $N/android-arm64 $N/android-x64
          mkdir -p $N/ios-arm64 $N/iossimulator-arm64 $N/maccatalyst

          find mln-artifacts/native-mln-windows-x64-vulkan   -name "mln-cabi.dll"   -exec cp {} $N/win-x64/       \; 2>/dev/null || true
          find mln-artifacts/native-mln-windows-arm64-vulkan -name "mln-cabi.dll"   -exec cp {} $N/win-arm64/     \; 2>/dev/null || true
          find mln-artifacts/native-mln-android-arm64-v8a    -name "libmln-cabi.so" -exec cp {} $N/android-arm64/ \; 2>/dev/null || true
          find mln-artifacts/native-mln-android-x86_64       -name "libmln-cabi.so" -exec cp {} $N/android-x64/   \; 2>/dev/null || true
          find mln-artifacts/native-ios-arm64               -name "libmln-cabi.a"  -exec cp {} $N/ios-arm64/     \; 2>/dev/null || true
          find mln-artifacts/native-iossimulator-arm64      -name "libmln-cabi.a"  -exec cp {} $N/iossimulator-arm64/ \; 2>/dev/null || true
          find mln-artifacts/native-maccatalyst              -name "libmln-cabi.a"  -exec cp {} $N/maccatalyst/   \; 2>/dev/null || true

          echo "Vulkan native libs arranged:"
          find $N -type f

      - name: Restore workloads
        run: dotnet workload restore maplibre-maui.sln

      - name: Pack MapLibreNative.Maui.Vulkan
        run: |
          dotnet pack bindings/MapLibreNative.Maui.Vulkan.csproj \
            -c Release \
            -p:Version=${{ needs.version-check.outputs.version }} \
            -p:_MlnNativeDir=$(pwd)/bindings/native-vulkan/ \
            -o artifacts/

      - name: Upload Vulkan NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-vulkan
          path: artifacts/*.nupkg
          retention-days: 7

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [version-check, pack, pack-wpf, pack-vulkan, samples-mobile]
    if: needs.version-check.outputs.published == 'false'
    environment: release

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK (for nuget push)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          pattern: nuget-packages*
          merge-multiple: true
          path: artifacts/

      - name: Download Windows sample zips
        uses: actions/download-artifact@v4
        with:
          name: windows-samples
          path: artifacts/

      - name: Download mobile samples (Android APK)
        uses: actions/download-artifact@v4
        with:
          name: mobile-samples
          path: artifacts/

      - name: Download iOS simulator app
        uses: actions/download-artifact@v4
        with:
          name: sample-ios-simulator
          path: artifacts/ios-simulator/

      - name: Download macCatalyst app
        uses: actions/download-artifact@v4
        with:
          name: sample-maccatalyst
          path: artifacts/maccatalyst/

      - name: Zip iOS simulator and macCatalyst apps
        run: |
          for app in artifacts/ios-simulator/**/*.app artifacts/maccatalyst/**/*.app; do
            [ -d "$app" ] || continue
            name=$(basename "$app" .app)
            zip -r "artifacts/${name}.zip" "$app"
          done

      - name: Extract changelog for version
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## $VERSION" \
              'BEGIN{p=0} $0==ver{p=1;next} /^## /&&p{exit} p{print}' \
              CHANGELOG.md > release-notes.md
          else
            echo "Release v${VERSION}." > release-notes.md
          fi
          cat release-notes.md

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:          v${{ needs.version-check.outputs.version }}
          name:         v${{ needs.version-check.outputs.version }}
          bodyFile:     release-notes.md
          artifacts:    "artifacts/*.nupkg,artifacts/*.zip,artifacts/*.apk"
          draft:        false
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push NuGet packages to NuGet.org
        run: |
          EXIT_CODE=0
          for pkg in artifacts/*.nupkg; do
            echo "Pushing $pkg..."
            if dotnet nuget push "$pkg" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate; then
              echo "✓ Successfully pushed or already exists: $(basename $pkg)"
            else
              echo "✗ FAILED to push: $(basename $pkg)"
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE
